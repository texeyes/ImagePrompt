<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Prompt Forge V2 | Unified Image & Video Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #161b2a;
            --accent: #00f2ff;
            --secondary: #7000ff;
            --text: #ffffff;
            --text-muted: #8b949e;
            --border: #30363d;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding-bottom: 150px;
        }
        .navbar { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(10px); sticky-top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .navbar-brand { font-weight: 800; color: var(--accent) !important; letter-spacing: -1px; }

        .container { max-width: 1400px; padding-top: 40px; }
        
        .section-header { 
            border-left: 4px solid var(--accent); 
            padding-left: 15px; 
            margin: 40px 0 20px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
        }

        label { font-weight: 600; margin-bottom: 8px; color: var(--text-muted); font-size: 0.8rem; }
        .form-control, .form-select {
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus { background: #161b2a; border-color: var(--accent); box-shadow: none; }

        /* Style Grid */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .grid-item {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            user-select: none;
        }
        .grid-item:hover { border-color: var(--accent); transform: translateY(-2px); }
        .grid-item.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 800; }
        
        /* Video Category Color */
        .video-section .grid-item.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .video-section .section-header { border-left-color: var(--secondary); color: var(--secondary); }

        /* Footer Prompt Bar */
        .prompt-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(22, 27, 42, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            padding: 20px;
            z-index: 2000;
        }
        #final-prompt {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            height: 60px;
            resize: none;
            border-radius: 8px;
        }
        .btn-action { font-weight: 800; border-radius: 8px; padding: 12px 24px; transition: 0.3s; }
        .btn-copy { background: var(--accent); color: #000; border: none; }
        .btn-copy:hover { box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">MEGA PROMPT FORGE V2</a>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-danger" onclick="clearAll()">RESET</button>
            <button class="btn btn-sm btn-outline-info" onclick="randomize()">SHUFFLE</button>
        </div>
    </div>
</nav>

<div class="container">
    <!-- CORE FIELDS -->
    <div class="section-header">01. Core Visualization</div>
    <div class="card mb-4">
        <div class="row g-3">
            <div class="col-12">
                <label>Main Subject / Narrative Action</label>
                <textarea id="desc" class="form-control" rows="2" placeholder="Describe the scene or story..." oninput="update()"></textarea>
            </div>
            <div class="col-md-6">
                <label>Negative Elements (--no)</label>
                <input id="neg" type="text" class="form-control" placeholder="ugly, deformed, text, lowres..." oninput="update()">
            </div>
            <div class="col-md-6">
                <label>Style/Image References (URLs)</label>
                <input id="urls" type="text" class="form-control" placeholder="https://..." oninput="update()">
            </div>
        </div>
    </div>

    <!-- SORA 2 VIDEO SECTION -->
    <div class="video-section">
        <div class="section-header">02. Sora 2 Cinematic Motion & Flow</div>
        <div class="card mb-4">
            <div class="style-grid" id="videoGrid">
                <!-- Video items injected -->
            </div>
        </div>
    </div>

    <!-- VISUAL STYLES GRID -->
    <div class="section-header">03. Artistic Style Presets</div>
    <div class="card mb-4">
        <div class="style-grid" id="styleGrid">
            <!-- Style items injected -->
        </div>
    </div>

    <!-- TECHNICAL PARAMETERS -->
    <div class="section-header">04. Technical & Midjourney Controls</div>
    <div class="card">
        <div class="row g-3">
            <div class="col-md-3">
                <label>Aspect Ratio</label>
                <select id="ar" class="form-select" onchange="update()">
                    <option value="">1:1 Square</option>
                    <option value="16:9">16:9 Cinema</option>
                    <option value="9:16">9:16 Vertical</option>
                    <option value="21:9">21:9 Ultrawide</option>
                    <option value="4:5">4:5 Portrait</option>
                </select>
            </div>
            <div class="col-md-3">
                <label>Model Version</label>
                <select id="v" class="form-select" onchange="update()">
                    <option value="6">MJ v6.0</option>
                    <option value="5.2">MJ v5.2</option>
                    <option value="niji">Niji 6</option>
                    <option value="sora">Sora Engine</option>
                </select>
            </div>
            <div class="col-md-2">
                <label>Stylize (0-1000)</label>
                <input id="stylize" type="number" class="form-control" value="100" oninput="update()">
            </div>
            <div class="col-md-2">
                <label>Chaos (0-100)</label>
                <input id="chaos" type="number" class="form-control" value="0" oninput="update()">
            </div>
            <div class="col-md-2">
                <label>Weird (0-3000)</label>
                <input id="weird" type="number" class="form-control" value="0" oninput="update()">
            </div>
        </div>
    </div>
</div>

<div class="prompt-footer">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-lg-10 mb-3 mb-lg-0">
                <textarea id="final-prompt" class="form-control w-100" readonly></textarea>
            </div>
            <div class="col-lg-2">
                <button class="btn btn-action btn-copy w-100" onclick="copyPrompt()">COPY PROMPT</button>
            </div>
        </div>
    </div>
</div>

<script>
    const styles = [
        "Photorealistic", "Hyper-detailed", "Cinematic", "Cyberpunk", "Synthwave", "Studio Ghibli",
        "Oil Painting", "Watercolour", "Sketch", "Ukiyo-e", "Double Exposure", "Vaporwave",
        "Noir Film", "Steampunk", "Isometric", "Pop Art", "Minimalism", "Macro Photography",
        "Drone Shot", "GoPro POV", "Polaroid", "Vintage 35mm", "Golden Hour", "Dramatic Shadows",
        "Kintsugi", "Origami", "Claymation", "8-bit", "Unreal Engine 5", "Ray Tracing", "C4D"
    ];

    const soraMotion = [
        "Cinematic Drone Orbit", "First-Person POV", "Slow Dolly Zoom", "Handheld Shake",
        "Static Tripod Shot", "360-degree Pan", "Extreme Close-Up", "Slow Motion 120fps",
        "Dynamic Time-Lapse", "Temporal Fluidity", "Morphing Transitions", "Anamorphic Flare",
        "Light Trails", "Seamless Loop", "Glitch Distortion", "Depth of Field Pull"
    ];

    const activeStyles = new Set();
    const activeMotion = new Set();

    function populate(id, list, set, cssClass) {
        const grid = document.getElementById(id);
        list.forEach(item => {
            const el = document.createElement('div');
            el.className = 'grid-item';
            el.innerText = item;
            el.onclick = () => {
                el.classList.toggle('active');
                if (set.has(item)) set.delete(item);
                else set.add(item);
                update();
            };
            grid.appendChild(el);
        });
    }

    function init() {
        populate('styleGrid', styles, activeStyles);
        populate('videoGrid', soraMotion, activeMotion);
        update();
    }

    function update() {
        let p = "";
        const desc = document.getElementById('desc').value;
        const urls = document.getElementById('urls').value;
        const neg = document.getElementById('neg').value;
        
        if (urls) p += urls + " ";
        if (desc) p += desc;
        
        const tags = [...activeMotion, ...activeStyles];
        if (tags.length > 0) p += (desc ? ", " : "") + tags.join(", ");
        
        const ar = document.getElementById('ar').value;
        const v = document.getElementById('v').value;
        const s = document.getElementById('stylize').value;
        const c = document.getElementById('chaos').value;
        const w = document.getElementById('weird').value;

        if (ar) p += ` --ar ${ar}`;
        if (v && v !== 'sora') p += ` --v ${v}`;
        if (v === 'sora') p += ` [Sora Video]`;
        if (s != 100) p += ` --stylize ${s}`;
        if (c > 0) p += ` --chaos ${c}`;
        if (w > 0) p += ` --weird ${w}`;
        if (neg) p += ` --no ${neg}`;
        
        document.getElementById('final-prompt').value = p.trim();
    }

    function copyPrompt() {
        const el = document.getElementById('final-prompt');
        el.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "COPIED! 🔥";
        setTimeout(() => btn.innerText = "COPY PROMPT", 2000);
    }

    function clearAll() {
        document.getElementById('desc').value = "";
        document.getElementById('neg').value = "";
        document.getElementById('urls').value = "";
        document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active'));
        activeStyles.clear();
        activeMotion.clear();
        update();
    }

    function randomize() {
        clearAll();
        const items = document.querySelectorAll('.grid-item');
        for(let i=0; i<4; i++) {
            const rand = items[Math.floor(Math.random() * items.length)];
            rand.click();
        }
    }

    init();
</script>
</body>
</html>
