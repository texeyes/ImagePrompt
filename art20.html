<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Prompt Engine v2.0</title>
    <style>
        :root { --bg: #0b0f19; --card-bg: #161b2c; --accent: #00f2ff; --text: #e2e8f0; --btn-hover: #00c4cc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* Top Control Panel */
        header { position: sticky; top: 0; background: #0b0f19e6; backdrop-filter: blur(10px); padding: 25px; border-bottom: 2px solid var(--accent); z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .control-container { max-width: 900px; margin: 0 auto; text-align: center; }
        #prompt-output { width: 100%; height: 100px; background: #000; color: var(--accent); border: 1px solid #334155; padding: 15px; font-family: 'Courier New', monospace; border-radius: 8px; margin-bottom: 15px; font-size: 1.1em; resize: none; box-shadow: inset 0 2px 10px rgba(0,242,255,0.1); }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 24px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; }
        .btn-rand { background: var(--accent); color: #000; }
        .btn-rand:hover { background: var(--btn-hover); transform: translateY(-2px); }
        .btn-reset { background: #475569; color: white; }
        .btn-copy { background: #10b981; color: white; }

        /* Gallery Grid */
        main { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border: 1px solid #2d3748; padding: 20px; border-radius: 12px; transition: transform 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.3em; border-bottom: 1px solid #2d3748; padding-bottom: 5px; }
        .trait { font-size: 0.9em; margin: 4px 0; color: #94a3b8; }
        .trait b { color: #cbd5e1; }
        .tags { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background: #1e293b; color: var(--accent); font-size: 0.75em; padding: 4px 10px; border-radius: 100px; border: 1px solid #334155; }
    </style>
</head>
<body>

<header>
    <div class="control-container">
        <h1 style="margin: 0 0 15px 0; font-size: 1.5em; letter-spacing: 2px;">PROMPT SLOT MACHINE</h1>
        <textarea id="prompt-output" readonly placeholder="Click Randomize to build a character prompt..."></textarea>
        <div class="btn-group">
            <button class="btn-rand" onclick="randomizeEverything()">🎲 Randomize Everything</button>
            <button class="btn-copy" onclick="copyPrompt()">📋 Copy Prompt</button>
            <button class="btn-reset" onclick="resetGallery()">🔄 Reset Gallery</button>
        </div>
    </div>
</header>

<main>
    <div id="gallery" class="grid"></div>
</main>

    ["Gold Sentinel", "Human (Masked)", "Urban Futurism", "Skull gold mask", "Walking sidewalk", "Golden skeletal mask", "Industrial green tile", "Street Photography", "Reflective gold spandex"]

const characters = data.map(row => ({
    id: row[0], species: row[1], aesthetic: row[2], facial: row[3], 
    action: row[4], prop: row[5], env: row[6], style: row[7], tex: row[8]
}));

const getRandVal = (key) => {
    const vals = characters.map(c => c[key]);
    return vals[Math.floor(Math.random() * vals.length)];
};

function randomizeEverything() {
    const p = `${getRandVal('species')}, ${getRandVal('aesthetic')} theme, ${getRandVal('facial')}, ${getRandVal('action')}, holding ${getRandVal('prop')}, ${getRandVal('env')}, ${getRandVal('style')} art style, ${getRandVal('tex')} texture.`;
    document.getElementById('prompt-output').value = p;
    copyPrompt();
    renderGallery(true);
}

function copyPrompt() {
    const text = document.getElementById('prompt-output').value;
    if(!text) return;
    navigator.clipboard.writeText(text);
    const btn = document.querySelector('.btn-copy');
    btn.innerText = "✅ COPIED!";
    setTimeout(() => btn.innerText = "📋 Copy Prompt", 1500);
}

function renderGallery(shuffle = false) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    let list = [...characters];
    if(shuffle) list.sort(() => Math.random() - 0.5);
    
    list.forEach(c => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div>
                <h3>${c.id}</h3>
                <div class="trait"><b>Type:</b> ${c.species}</div>
                <div class="trait"><b>Face:</b> ${c.facial}</div>
                <div class="trait"><b>Action:</b> ${c.action}</div>
                <div class="trait"><b>Prop:</b> ${c.prop}</div>
                <div class="trait"><b>Scene:</b> ${c.env}</div>
            </div>
            <div class="tags">
                <span class="tag">${c.aesthetic}</span>
                <span class="tag">${c.style}</span>
                <span class="tag">${c.tex}</span>
            </div>
        `;
        gallery.appendChild(div);
    });
}

function resetGallery() {
    document.getElementById('prompt-output').value = '';
    renderGallery(false);
}

// Initial Load
renderGallery();
</script>
</body>
</html>
