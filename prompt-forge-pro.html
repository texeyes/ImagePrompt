<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Forge Pro | Unified Image Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .container { max-width: 1200px; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .nav-tabs { border-bottom: 1px solid #334155; margin-bottom: 24px; }
        .nav-link { color: var(--text-muted); border: none !important; font-weight: 600; padding: 12px 24px; }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { background: transparent !important; color: var(--accent) !important; border-bottom: 3px solid var(--accent) !important; }
        
        label { font-weight: 600; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        .form-control, .form-select {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus { background: #1e293b; color: white; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .style-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
        }
        .style-item:hover { border-color: var(--accent); background: #1e293b; }
        .style-item.active { background: var(--accent); color: #0f172a; border-color: var(--accent); font-weight: bold; }
        
        .output-card {
            position: sticky;
            top: 24px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid var(--accent);
        }
        #final-prompt {
            min-height: 120px;
            background: rgba(0,0,0,0.3);
            border: none;
            color: var(--accent);
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 1rem;
            resize: none;
        }
        .btn-copy { background: var(--accent); color: #0f172a; font-weight: 800; border: none; padding: 12px; border-radius: 8px; width: 100%; }
        .btn-copy:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .toggle-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .toggle-item {
            padding: 6px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .toggle-item.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PROMPT FORGE PRO</h1>
        <p class="text-muted">Unified Filter Suite from PromptSalsa, PromptFolder & SpacePrompts</p>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <ul class="nav nav-tabs" id="forgeTabs" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#core">Core Filters</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#styles">Visual Styles</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#advanced">MJ Parameters</button></li>
            </ul>

            <div class="tab-content">
                <!-- CORE FILTERS -->
                <div class="tab-pane fade show active" id="core">
                    <div class="card">
                        <label>Main Subject / Description</label>
                        <textarea id="description" class="form-control mb-4" placeholder="A futuristic cyberpunk warrior in Neo-Austin..." oninput="update()"></textarea>
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Negative Prompt (Exclude)</label>
                                <input id="negative" type="text" class="form-control" placeholder="text, blurry, low quality..." oninput="update()">
                            </div>
                            <div class="col-md-6">
                                <label>Image URLs (Reference)</label>
                                <input id="urls" type="text" class="form-control" placeholder="https://image.url" oninput="update()">
                            </div>
                            <div class="col-md-4">
                                <label>Media Type</label>
                                <select id="media" class="form-select" onchange="update()">
                                    <option value="">Not Specified</option>
                                    <option>Photography</option>
                                    <option>Graphic Design</option>
                                    <option>3D Render</option>
                                    <option>Digital Artwork</option>
                                    <option>Oil Painting</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>Lighting</label>
                                <select id="lighting" class="form-select" onchange="update()">
                                    <option value="">Not Specified</option>
                                    <option>Cinematic</option>
                                    <option>Golden Hour</option>
                                    <option>Neon</option>
                                    <option>Soft Lighting</option>
                                    <option>Studio Light</option>
                                    <option>Volumetric</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>Mood</label>
                                <select id="mood" class="form-select" onchange="update()">
                                    <option value="">Not Specified</option>
                                    <option>Ethereal</option>
                                    <option>Dark & Gritty</option>
                                    <option>Whimsical</option>
                                    <option>Epic</option>
                                    <option>Nostalgic</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- VISUAL STYLES -->
                <div class="tab-pane fade" id="styles">
                    <div class="card">
                        <label>Choose Style Presets (PromptFolder + SpacePrompts)</label>
                        <div class="style-grid" id="styleGrid">
                            <!-- Styles injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- MJ PARAMETERS -->
                <div class="tab-pane fade" id="advanced">
                    <div class="card">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Aspect Ratio (--ar)</label>
                                <select id="ar" class="form-select" onchange="update()">
                                    <option value="">1:1</option>
                                    <option value="16:9">16:9</option>
                                    <option value="9:16">9:16</option>
                                    <option value="3:2">3:2</option>
                                    <option value="2:1">2:1</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label>Version (--v)</label>
                                <select id="version" class="form-select" onchange="update()">
                                    <option value="6">Version 6</option>
                                    <option value="5.2">Version 5.2</option>
                                    <option value="niji">Niji (Anime)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>Stylize (0-1000)</label>
                                <input id="stylize" type="number" class="form-control" value="100" oninput="update()">
                            </div>
                            <div class="col-md-4">
                                <label>Chaos (0-100)</label>
                                <input id="chaos" type="number" class="form-control" value="0" oninput="update()">
                            </div>
                            <div class="col-md-4">
                                <label>Weird (0-3000)</label>
                                <input id="weird" type="number" class="form-control" value="0" oninput="update()">
                            </div>
                        </div>
                        <div class="mt-4">
                            <label>Toggles</label>
                            <div class="toggle-group" id="toggleGroup">
                                <div class="toggle-item" onclick="toggleBtn(this, '--tile')">Tile</div>
                                <div class="toggle-item" onclick="toggleBtn(this, '--raw')">Style Raw</div>
                                <div class="toggle-item" onclick="toggleBtn(this, '--hd')">HD</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card output-card">
                <label>Generated Prompt</label>
                <textarea id="final-prompt" class="form-control mb-3" readonly></textarea>
                <button class="btn btn-copy" onclick="copyPrompt()">COPY PROMPT</button>
            </div>
            
            <div class="mt-3">
                <button class="btn btn-outline-secondary w-100 mb-2" onclick="randomize()">🎲 RANDOMIZE ALL</button>
                <button class="btn btn-outline-danger w-100" onclick="clearAll()">🗑️ CLEAR ALL</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const styles = [
        "16-bit", "1800s", "Cyberpunk", "Vaporwave", "Surrealism", "Ukiyo-e", "Double Exposure", 
        "Isometric", "Synthwave", "Origami", "Glitch Art", "Kintsugi", "Studio Ghibli", 
        "Charcoal", "Blueprint", "3D Render", "Claymation", "Minimalist", "Pop Art", "Steampunk",
        "Noir", "Macro", "Tilt Shift", "Fisheye", "Cinestill 800t", "Hyperrealistic", "Low Poly"
    ];

    const activeStyles = new Set();
    const activeToggles = new Set();

    function init() {
        const grid = document.getElementById('styleGrid');
        styles.forEach(s => {
            const el = document.createElement('div');
            el.className = 'style-item';
            el.innerText = s;
            el.onclick = () => {
                el.classList.toggle('active');
                if (activeStyles.has(s)) activeStyles.delete(s);
                else activeStyles.add(s);
                update();
            };
            grid.appendChild(el);
        });
        update();
    }

    function toggleBtn(el, tag) {
        el.classList.toggle('active');
        if (activeToggles.has(tag)) activeToggles.delete(tag);
        else activeToggles.add(tag);
        update();
    }

    function update() {
        let p = "";
        const desc = document.getElementById('description').value;
        const urls = document.getElementById('urls').value;
        const media = document.getElementById('media').value;
        const light = document.getElementById('lighting').value;
        const mood = document.getElementById('mood').value;
        const neg = document.getElementById('negative').value;
        
        if (urls) p += urls + " ";
        if (desc) p += desc;
        
        const tags = [];
        if (media) tags.push(media);
        if (light) tags.push(light + " lighting");
        if (mood) tags.push(mood + " mood");
        activeStyles.forEach(s => tags.push(s + " style"));
        
        if (tags.length > 0) p += (desc ? ", " : "") + tags.join(", ");
        
        // Parameters
        const ar = document.getElementById('ar').value;
        const v = document.getElementById('version').value;
        const s = document.getElementById('stylize').value;
        const c = document.getElementById('chaos').value;
        const w = document.getElementById('weird').value;
        
        if (ar) p += ` --ar ${ar}`;
        if (v) p += ` --v ${v}`;
        if (s != 100) p += ` --stylize ${s}`;
        if (c > 0) p += ` --chaos ${c}`;
        if (w > 0) p += ` --weird ${w}`;
        
        activeToggles.forEach(t => p += ` ${t}`);
        if (neg) p += ` --no ${neg}`;
        
        document.getElementById('final-prompt').value = p.trim();
    }

    function copyPrompt() {
        const el = document.getElementById('final-prompt');
        el.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "COPIED! ✅";
        setTimeout(() => btn.innerText = "COPY PROMPT", 2000);
    }

    function randomize() {
        const selects = document.querySelectorAll('select');
        selects.forEach(s => {
            const options = s.options;
            s.selectedIndex = Math.floor(Math.random() * options.length);
        });
        update();
    }

    function clearAll() {
        document.getElementById('description').value = "";
        document.getElementById('negative').value = "";
        document.getElementById('urls').value = "";
        document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        document.querySelectorAll('.style-item, .toggle-item').forEach(el => el.classList.remove('active'));
        activeStyles.clear();
        activeToggles.clear();
        update();
    }

    init();
</script>
</body>
</html>
