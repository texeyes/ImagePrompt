<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple-Stream Prompt Engine</title>
    <style>
        :root { --bg: #05080f; --panel: #111827; --m1: #f472b6; --m2: #38bdf8; --m3: #a78bfa; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Top Control Header */
        header { text-align: center; margin-bottom: 40px; padding: 20px; border-bottom: 1px solid #1f2937; }
        .btn-main { padding: 15px 40px; font-size: 1.2em; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; background: white; color: black; transition: 0.3s; text-transform: uppercase; }
        .btn-main:hover { background: #d1d5db; transform: scale(1.02); }

        /* Multi-Prompt Display Area */
        .streams { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .prompt-box { background: var(--panel); border-radius: 12px; padding: 20px; position: relative; border-left: 6px solid #ccc; }
        .box-m1 { border-color: var(--m1); }
        .box-m2 { border-color: var(--m2); }
        .box-m3 { border-color: var(--m3); }
        
        .label { position: absolute; top: -10px; left: 20px; background: var(--bg); padding: 2px 10px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .label-m1 { color: var(--m1); }
        .label-m2 { color: var(--m2); }
        .label-m3 { color: var(--m3); }

        textarea { width: 100%; height: 80px; background: transparent; border: none; color: white; font-family: 'Courier New', monospace; font-size: 0.95em; resize: none; outline: none; margin-top: 5px; }
        
        .copy-hint { font-size: 0.7em; color: #6b7280; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin-bottom: 20px; letter-spacing: 2px;">PROMPT COMMAND CENTER</h2>
        <button class="btn-main" onclick="generateAll()">🎲 GENERATE ALL STREAMS</button>
        <p style="color: #6b7280; font-size: 0.8em; margin-top: 10px;">Primary model (M1) is automatically copied to clipboard.</p>
    </header>

    <div class="streams">
        <div class="prompt-box box-m1">
            <span class="label label-m1">Model Stream 01</span>
            <textarea id="out-MODEL1" readonly placeholder="M1 Results..."></textarea>
            <div class="copy-hint" id="hint-m1">Auto-copies on click</div>
        </div>

        <div class="prompt-box box-m2">
            <span class="label label-m2">Model Stream 02</span>
            <textarea id="out-MODEL2" readonly placeholder="M2 Results..."></textarea>
        </div>

        <div class="prompt-box box-m3">
            <span class="label label-m3">Model Stream 03</span>
            <textarea id="out-MODEL3" readonly placeholder="M3 Results..."></textarea>
        </div>
    </div>
</div>

<script>
const cats = ["Species", "Aesthetic", "Facial", "Action", "Prop", "Environment", "Style", "Texture"];
const data = [
    ["MODEL1", "Alien Goat", "1970s Psychedelic", "Orange shades", "Playing instrument", "Pink Bass", "Atrium", "3D Illustration", "Textured fur"],
    ["MODEL1", "Groovy Ape", "Vintage Disco", "Afro", "Dancing", "Mirror ball", "Disco floor", "Retro Poster", "Velvet"],
    ["MODEL1", "Neon Sloth", "Acid Dream", "Swirly eyes", "Floating", "Lava lamp", "Rainbow nebula", "Airbrush", "Iridescent"],
    ["MODEL2", "Electric Rodent", "Cyberpunk", "Implants", "Running", "Data shard", "Neon alley", "Cinematic Render", "Chrome"],
    ["MODEL2", "Cyborg Vixen", "Dark Electro", "Mechanical jaw", "Hacking", "Neural link", "Server room", "Concept Art", "Carbon fiber"],
    ["MODEL2", "Rusty Bot", "Desert Sci-Fi", "Ocular sensor", "Repairing", "Wrench", "Scrap yard", "Weathered 3D", "Rusted iron"],
    ["MODEL3", "Starry Chibi", "Kawaii", "Star eyes", "Giggling", "Magic wand", "Candy clouds", "Vector Art", "Glitter"],
    ["MODEL3", "Pastel Dragon", "Whimsical", "Floral horns", "Flying", "Crystal egg", "Crystal cave", "Watercolour", "Scales"],
    ["MODEL3", "Plush Kitten", "Nursery", "Button eyes", "Napping", "Ball of yarn", "Moonlight room", "Soft 3D Sculpt", "Fleece"]
];

const items = data.map(r => ({
    mid: r[0], Species: r[1], Aesthetic: r[2], Facial: r[3], Action: r[4], 
    Prop: r[5], Environment: r[6], Style: r[7], Texture: r[8]
}));

function generateAll() {
    const models = ["MODEL1", "MODEL2", "MODEL3"];
    
    models.forEach(mId => {
        const filtered = items.filter(i => i.mid === mId);
        let parts = [];
        cats.forEach(cat => {
            const vals = filtered.map(f => f[cat]);
            parts.push(`${cat}: ${vals[Math.floor(Math.random() * vals.length)]}`);
        });
        const finalStr = parts.join(", ");
        document.getElementById(`out-${mId}`).value = finalStr;
        
        // Auto-copy only the first model as requested
        if(mId === "MODEL1") {
            navigator.clipboard.writeText(finalStr);
            const hint = document.getElementById('hint-m1');
            hint.innerText = "✅ COPIED TO CLIPBOARD";
            hint.style.color = "#10b981";
            setTimeout(() => {
                hint.innerText = "Auto-copies on click";
                hint.style.color = "#6b7280";
            }, 2000);
        }
    });
}
</script>
</body>
</html>
