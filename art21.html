<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Command Center v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #030712; --panel: #111827; --m1: #f472b6; --m2: #38bdf8; --m3: #a78bfa; --m4: #fbbf24; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #374151; padding-bottom: 20px; }
        
        /* Category Filters */
        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: #1f2937; padding: 15px; border-radius: 8px; }
        .filter-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; cursor: pointer; }
        .filter-item input { accent-color: var(--m2); }

        .btn-group { display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 12px 25px; font-weight: 800; border-radius: 6px; border: none; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-gen { background: #f3f4f6; color: #000; }
        .btn-chaos { background: var(--m4); color: #000; }

        /* Streams */
        .streams { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 25px; }
        .prompt-box { background: var(--panel); border-radius: 10px; padding: 18px; position: relative; border-left: 5px solid #4b5563; }
        .box-m1 { border-color: var(--m1); }
        .box-m2 { border-color: var(--m2); }
        .box-m3 { border-color: var(--m3); }
        .box-m4 { border-color: var(--m4); }

        .label { position: absolute; top: -10px; left: 15px; background: var(--bg); padding: 2px 8px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; }
        textarea { width: 100%; height: 60px; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 0.9em; resize: none; outline: none; margin-top: 5px; }
        .copy-tag { font-size: 0.7em; color: #9ca3af; text-align: right; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>COMMAND CENTER v4.0</h1>
        
        <div class="filters" id="cat-filters"></div>

        <div class="btn-group">
            <button class="btn btn-gen" onclick="generate(false)">🎲 Generate Streams</button>
            <button class="btn btn-chaos" onclick="generate(true)">🌪️ Global Chaos</button>
        </div>
    </header>

    <div class="streams">
        <div class="prompt-box box-m1"><span class="label" style="color:var(--m1)">Stream 01 (M1)</span><textarea id="out-MODEL1" readonly></textarea><div class="copy-tag" id="tag-MODEL1"></div></div>
        <div class="prompt-box box-m2"><span class="label" style="color:var(--m2)">Stream 02 (M2)</span><textarea id="out-MODEL2" readonly></textarea><div class="copy-tag" id="tag-MODEL2"></div></div>
        <div class="prompt-box box-m3"><span class="label" style="color:var(--m3)">Stream 03 (M3)</span><textarea id="out-MODEL3" readonly></textarea><div class="copy-tag" id="tag-MODEL3"></div></div>
        <div class="prompt-box box-m4"><span class="label" style="color:var(--m4)">Stream 04 (Chaos)</span><textarea id="out-CHAOS" readonly></textarea><div class="copy-tag" id="tag-CHAOS"></div></div>
    </div>
</div>

<script>
const cats = ["Species", "Aesthetic", "Facial", "Action", "Prop", "Environment", "Style", "Texture"];
const data = [
    ["MODEL1", "Alien Goat", "1970s Psychedelic", "Orange shades", "Playing instrument", "Pink Bass", "Atrium", "3D Illustration", "Textured fur"],
    ["MODEL1", "Groovy Ape", "Vintage Disco", "Afro", "Dancing", "Mirror ball", "Disco floor", "Retro Poster", "Velvet"],
    ["MODEL1", "Neon Sloth", "Acid Dream", "Swirly eyes", "Floating", "Lava lamp", "Rainbow nebula", "Airbrush", "Iridescent"],
    ["MODEL2", "Electric Rodent", "Cyberpunk", "Implants", "Running", "Data shard", "Neon alley", "Cinematic Render", "Chrome"],
    ["MODEL2", "Cyborg Vixen", "Dark Electro", "Mechanical jaw", "Hacking", "Neural link", "Server room", "Concept Art", "Carbon fiber"],
    ["MODEL2", "Rusty Bot", "Desert Sci-Fi", "Ocular sensor", "Repairing", "Wrench", "Scrap yard", "Weathered 3D", "Rusted iron"],
    ["MODEL3", "Starry Chibi", "Kawaii", "Star eyes", "Giggling", "Magic wand", "Candy clouds", "Vector Art", "Glitter"],
    ["MODEL3", "Pastel Dragon", "Whimsical", "Floral horns", "Flying", "Crystal egg", "Crystal cave", "Watercolour", "Scales"],
    ["MODEL3", "Plush Kitten", "Nursery", "Button eyes", "Napping", "Ball of yarn", "Moonlight room", "Soft 3D Sculpt", "Fleece"]
];

const items = data.map(r => ({ mid: r[0], Species: r[1], Aesthetic: r[2], Facial: r[3], Action: r[4], Prop: r[5], Environment: r[6], Style: r[7], Texture: r[8] }));

// Init Filters
const filterContainer = document.getElementById('cat-filters');
cats.forEach(c => {
    const el = document.createElement('label');
    el.className = 'filter-item';
    el.innerHTML = `<input type="checkbox" checked id="chk-${c}"> ${c}`;
    filterContainer.appendChild(el);
});

function generate(isChaos) {
    const models = ["MODEL1", "MODEL2", "MODEL3"];
    let allGenerated = [];

    // Standard Streams
    models.forEach(mId => {
        const filteredData = items.filter(i => i.mid === mId);
        const p = buildPrompt(filteredData);
        document.getElementById(`out-${mId}`).value = p;
        allGenerated.push({id: mId, val: p});
    });

    // Chaos Stream
    const chaosPrompt = buildPrompt(items);
    document.getElementById('out-CHAOS').value = chaosPrompt;
    allGenerated.push({id: 'CHAOS', val: chaosPrompt});

    // Reset tags and copy random
    ["MODEL1", "MODEL2", "MODEL3", "CHAOS"].forEach(id => document.getElementById(`tag-${id}`).innerText = "");
    const lucky = allGenerated[Math.floor(Math.random() * allGenerated.length)];
    if(lucky.val) {
        navigator.clipboard.writeText(lucky.val);
        document.getElementById(`tag-${lucky.id}`).innerText = "📋 RANDOM PICK COPIED!";
    }

    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f472b6', '#38bdf8', '#a78bfa', '#fbbf24'] });
}

function buildPrompt(source) {
    let p = [];
    cats.forEach(c => {
        if(document.getElementById(`chk-${c}`).checked) {
            const pool = source.map(s => s[c]);
            p.push(`${c}: ${pool[Math.floor(Math.random() * pool.length)]}`);
        }
    });
    return p.join(", ");
}
</script>
</body>
</html>
